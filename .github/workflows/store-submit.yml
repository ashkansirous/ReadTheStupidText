name: store-submit

# Submits a released MSIX to the Microsoft Store via the msstore CLI.
#
# MANUAL ONLY (workflow_dispatch). The app is published and live in the Store
# (product 9NGT1BN1H92V), so the Actions-based msstore flow — which does *updates*
# to an already-live free product — is now usable. To run it you need, configured
# once in repo Settings -> Secrets and variables -> Actions (see STORE.md):
#   - Secrets:  AZURE_AD_TENANT_ID, AZURE_AD_APPLICATION_CLIENT_ID,
#               AZURE_AD_APPLICATION_SECRET, SELLER_ID
#   - Variable: STORE_PRODUCT_ID  (already set to 9NGT1BN1H92V)
# Without the secrets the "Configure Store credentials" step fails fast.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit (e.g. v1.0.0)'
        required: true

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - name: Download the release's MSIX packages
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force packages | Out-Null
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" --pattern "*.msix" --dir packages
          $msix = Get-ChildItem packages -Filter *.msix
          if ($msix.Count -lt 1) { throw "No .msix assets found on release ${{ inputs.tag }}" }
          Write-Host "Downloaded $($msix.Count) package(s): $($msix.Name -join ', ')"

      - name: Bundle x64 + ARM64 into a single .msixbundle
        shell: pwsh
        run: |
          # Both architectures must ship in ONE submission. Single-project MSIX
          # builds emit a per-arch .msix (AppxBundle=Never), so combine them into
          # one .msixbundle here and submit that once — submitting each .msix
          # separately would open competing submissions.
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found in the Windows SDK on this runner" }
          New-Item -ItemType Directory -Force out | Out-Null
          & $makeappx.FullName bundle /d packages /p out\ReadTheStupidText.msixbundle /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx bundle failed ($LASTEXITCODE)" }

      - name: Set up the Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
            --sellerId ${{ secrets.SELLER_ID }} `
            --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} `
            --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      - name: Publish the update to the Store
        shell: pwsh
        run: |
          # One submission carrying both architectures via the bundle.
          msstore publish "out\ReadTheStupidText.msixbundle" -id ${{ vars.STORE_PRODUCT_ID }}
