name: build

# One workflow runs the whole release pipeline in a single run — no PAT, no
# commit-back to main, no second workflow to trigger:
#
#   1. version  — GitVersion derives the SemVer from git history (git tags are
#                 the source of truth). main defaults to a Patch bump; override
#                 per commit with "+semver: minor" / "+semver: major" (see
#                 GitVersion.yml).
#   2. build    — packages the WinUI 3 single-project MSIX per architecture with
#                 that version stamped into the manifest at build time. Unsigned
#                 (the Microsoft Store re-signs on submission). Single-project
#                 MSIX can't emit a bundle, so each arch is built separately.
#   3. release  — only on a push to main: creates the v<x.y.z> tag at the merge
#                 commit and a GitHub Release with the MSIX assets. Because it's
#                 the same run, a plain GITHUB_TOKEN is enough (no cross-workflow
#                 trigger needed). PRs build + upload artifacts only.
#
# See Decision 17 / Slice 14 in plan.md and STORE.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # the release job creates the tag + GitHub Release

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.majorMinorPatch }}
      semver: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - name: Checkout (full history + tags — GitVersion needs them)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          useConfigFile: true

  build:
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout (with LFS — the neural voice model is LFS-tracked)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Stamp the GitVersion-derived version into the manifest (x.y.z.0 — the
      # Store requires revision 0). The match is anchored to the start of the
      # line and the self-closing ' />' so it only touches the Identity Version,
      # never TargetDeviceFamily's MinVersion/MaxVersionTested. Working copy only
      # — never committed; git tags remain the source of truth.
      - name: Stamp manifest version (${{ needs.version.outputs.version }}.0)
        shell: bash
        env:
          MANIFEST: src/ReadTheStupidText.App/Package.appxmanifest
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          sed -i -E "s#^([[:space:]]*)Version=\"[0-9.]+\"([[:space:]]*/>)#\1Version=\"${VERSION}.0\"\2#" "$MANIFEST"
          if ! grep -qF "Version=\"${VERSION}.0\" />" "$MANIFEST"; then
            echo "::error::Failed to stamp Version=\"${VERSION}.0\" into ${MANIFEST}"; exit 1
          fi
          grep -nE 'Version=' "$MANIFEST"

      # RuntimeIdentifier is passed explicitly because the csproj otherwise infers
      # it from RuntimeInformation.ProcessArchitecture, and setup-msbuild puts the
      # 32-bit MSBuild.exe on PATH (reports x86) → NETSDK1032 against Platform=x64.
      - name: Build and package MSIX (${{ matrix.platform }})
        run: >
          msbuild src/ReadTheStupidText.App/ReadTheStupidText.App.csproj
          /restore
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:RuntimeIdentifier=${{ matrix.rid }}
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=${{ github.workspace }}\AppPackages\
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never
          /p:AppxPackageSigningEnabled=false

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadTheStupidText-msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\AppPackages\**\*.msix
          if-no-files-found: error

  # On a push to main, cut the release: tag v<x.y.z> at the merge commit and
  # publish the built MSIX packages as GitHub Release assets (stable, README-
  # linkable URLs and the hosted source for Store submission). Same run, so the
  # GITHUB_TOKEN-created tag needs no downstream trigger.
  release:
    needs: [version, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built MSIX packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create v${{ needs.version.outputs.version }} tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Only the app package per arch — NOT the framework dependency packages
          # under Dependencies/ (every arch ships a same-named
          # Microsoft.WindowsAppRuntime.2.msix, which would collide as duplicate
          # release asset names). The Store/Windows resolves that runtime dependency.
          msix_files=$(find artifacts -name 'ReadTheStupidText.App_*.msix')
          echo "Publishing v${VERSION}:"; echo "$msix_files"
          # --target pins the tag to this merge commit; gh creates the tag itself.
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "v${VERSION}" \
            --generate-notes \
            $msix_files
