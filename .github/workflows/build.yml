name: build

# Builds and packages the WinUI 3 single-project MSIX app on every push/PR to
# main. Produces an unsigned MSIX per architecture as a build artifact — the
# Microsoft Store re-signs on submission, so no signing certificate is needed in
# CI. (Single-project MSIX can't produce a bundle, so each arch is built
# separately; see Decision 16 / Slice 5 in plan.md.)
#
# On a version tag (v*), the same MSIX packages are published to a GitHub Release
# so they have stable, README-linkable download URLs and a hosted source for
# Store deployment (see .github/workflows/store-submit.yml).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout (with LFS — the neural voice model is LFS-tracked)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # RuntimeIdentifier is passed explicitly because the csproj otherwise infers
      # it from RuntimeInformation.ProcessArchitecture, and setup-msbuild puts the
      # 32-bit MSBuild.exe on PATH (reports x86) → NETSDK1032 against Platform=x64.
      - name: Build and package MSIX (${{ matrix.platform }})
        run: >
          msbuild src/ReadTheStupidText.App/ReadTheStupidText.App.csproj
          /restore
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:RuntimeIdentifier=${{ matrix.rid }}
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=${{ github.workspace }}\AppPackages\
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never
          /p:AppxPackageSigningEnabled=false

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadTheStupidText-msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\AppPackages\**\*.msix
          if-no-files-found: error

  # On a version tag, publish the built MSIX packages as GitHub Release assets so
  # they have stable download URLs (linked from the README) and a hosted source
  # for the Store-submission workflow. Runs only for tags, after the builds pass.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built MSIX packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release with MSIX assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only the app package per arch — NOT the framework dependency packages
          # under Dependencies/ (every arch ships a same-named
          # Microsoft.WindowsAppRuntime.2.msix, which would collide as duplicate
          # release asset names). The Store/Windows resolves that runtime dependency.
          msix_files=$(find artifacts -name 'ReadTheStupidText.App_*.msix')
          echo "Publishing:"; echo "$msix_files"
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $msix_files
